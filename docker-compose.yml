version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: trademinder
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trademinder
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trademinder -d trademinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trademinder:password@db:5432/trademinder
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5431:5431"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 5431 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5430:5430"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:5431

volumes:
  pgdata:
